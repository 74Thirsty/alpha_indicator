services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tax_filing
      POSTGRES_USER: tax
      POSTGRES_PASSWORD: tax
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: ["anvil", "--host", "0.0.0.0"]
    ports: ["8545:8545"]
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.example
    depends_on: [postgres, redis, anvil]
    ports: ["8000:8000"]
    volumes: ["document_data:/app/var/encrypted_documents"]
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.example
    depends_on: [backend, redis, postgres]
    command: ["python", "-m", "app.workers.event_listener"]
volumes:
  postgres_data:
  document_data:
